	-D HW_VERSION=${this.hardware.version}
	-D HARDWARE_INPUT_TYPE=INPUT_${this.input.type}
	-D HARDWARE_OUTPUT_TYPE=OUTPUT_${this.output.type}
	-D OPTION_LCD_TYPE=${this.output.lcd_type}
	-D OPTION_SERIAL_OUTPUT=SERIAL_${this.output.serial_type}
	-D WANT_NEOPIXEL=${this.neopixel}
	-D WANT_DEBUGGING=false
	-D OPTION_SMS_ADAPTER=${this.core.options.sms.adapter}
	-D OPTION_GG_ADAPTER=${this.core.options.gg.adapter}
	-D OPTION_SG1000_ADAPTER=${this.core.options.sg1000.adapter}
build_flags =
	${this.arch.build_flags}
extra_scripts =
	${this.arch.extra_scripts}
lib_deps =
	${this.arch.lib_deps}
	${this.output.lib_deps}
	${this.input.lib_deps}

[env:Databases]
platform = symlink://${PROJECT_DIR}/databases
