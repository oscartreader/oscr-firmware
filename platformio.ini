; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
name = OSCR Firmware
description = Firmware for the OSCR
default_envs = HardwareV5, HardwareV4, HardwareV3, HardwareV2, HardwareV1, SerialASCII, SerialANSI
extra_configs =
  user.ini

;
; !! START OF USER SETTINGS !!
;
; Note: Most setting values are case sensitive!
;

[oscr]

;
; [ FIRMWARE L10N ]
; Choose your language and region.
;
; Languages
; - EN    : English
;
language = en
;
; Regions
; - AUTO  : Global
; - NA    : North America
; - EU    : Europe
; - AS    : Asia
; - AF    : Africa
; - OC    : Oceania
; - SA    : South America
; - AN    : Antarctica
;
region = auto
;

;
; [ FIRMWARE OPTIONS ]
; Toggle various firmware options here to customize things to your liking.
;
; true  : enabled
; false : disabled
;

; [ POWER SAVING OPTIONS ]
; Save power when idle! These power saving options are fairly unobtrusive.
;
; Note: The OSCR is only considered idle when sitting on a menu or prompt,
;       if it is actively dumping a cartridge, etc, it will not enter power
;       saving mode.
;
powersaving = true
;

; [ ATMEGA2560 3.3V STABILITY FIX (3V3FIX) ]
; Enable if your mega is unstable when running on 3.3V
;
mega3v3fix = false
;

; [ CONFIGURATION FILE SUPPORT ]
; Allow configuring some options via a config file.
;
config = false
;

; [ UPDATER SUPPORT ]
; Allows software to identify the hardware version and other features of an OSCR connected via USB.
;
updater = true
;

; [ DEBUGGING ]
; Enable debug messages via serial. Cannot be used with, and will be ignored by, ANSI serial.
;
debugging = false
;

[hardware]

;
; [ HARDWARE CONFIGURATION ]
; Configure the firmware for your specific hardware here.
;
; true  : enabled
; false	: disabled
;

; [ ON-BOARD ATMEGA2560 ]
; Support for having an on-board ATmega2560. Only available on HW5R8 or newer.
;
; module			: ATmega2560 is attached as a module
;	integrated	: ATmega2560 is direct on-board
;
atmega = module
;

; [ CLOCK SIGNAL GENERATOR (CLOCKGEN) ]
; Support for the Si5351 clock signal generator.
;
; Enable if you have one of:
; - Adafruit Clock Generator module
; - Clone of an Adafruit Clock Generator module
; - The on-board Si5351
;
clockgen = true
;

; [ REAL TIME CLOCK (RTC) ]
; Support for having a real-time clock.
;
; Enable if you have one of:
; - Adafruit Clock Generator module
; - Clone of an Adafruit Clock Generator module
; - The on-board Si5351
;
rtc = false
;

; [ RTC TYPE ]
;
; Options:
;  DS3231
;  DS1307
;
rtc_type = DS3231
;

; [ AUTOMATIC VOLTAGE SELECT (VSELECT) ]
; Support for VSELECT (TPS2113 or similar).
;
vselect = false
;


[cores]
;
; [ CORE SUPPORT ]
; Toggle the enabled cores here.
;
; auto  : accept the default for the hardware version
; true  : enable the core
; false : disable the core
;
arc = auto
atari2600 = auto
atari5200 = auto
atari7800 = auto
atari8 = auto
atarijaguar = auto
atarilynx = auto
bally = auto
c64 = auto
colv = auto
cps3 = auto
fairchild = auto
flash = auto
flash16 = auto
gbx = auto
gpc = auto
intv = auto
leapster = auto
littlejammer = auto
littlejammerpro = auto
loopy = auto
md = auto
msx = auto
n64 = auto
nes = auto
ngp = auto
ody2 = auto
pce = auto
pcw = auto
poke = auto
pv1000 = auto
rcastudio2 = auto
sfm = auto
sms = auto
snes = auto
st = auto
superacan = auto
supervision = auto
satellaview = auto
ti99 = auto
tommypyuuta = auto
trs80 = auto
vectrex = auto
vic20 = auto
vboy = auto
vsmile = auto
wonderswan = auto

selftest = auto

[options]
; [ UNIQUE DIRECTORY METHOD ]
; The method used when generating unique directories.
;
; Options:
;  AUTO       : Decide based on available features
;  INCREMENT  : Use an incrementing number
;  RTC        : Use the date and time
;  BOTH       : Use both
;
unique.method = auto
;

; [ POWER SAVING OPTIONS]
;
; Time before dozing (ms)
powersaving.idle.drowse = 30000
;
; Time before going to sleep (ms)
powersaving.idle.sleep = 60000
;
; Methods used
powersaving.methods = display-dim|display-off|clock-slow
;


;
; [ CRDB OPTIONS ]
; Options for CRDB (cartridge/mapper/etc databases)
;
; ====== ID32 Multimatching Method ======
; ID32s are generally a checksum of a predetermined area of a cart
; used to identify the cartridge. Some cores, such as the NES core,
; use them to avoid you having to select the cart settings manually.
;
; These options lets you choose which method to use for that matching.
;

;
; == NOTE ==
; You should generally leave this alone. However, if you are having
; issues getting specific carts to match, you could try changing the
; method to a different one.
;
; The `id32b` method is closest to the one used in the old firmware.
;
; The `id32a` method uses a different region (starting address).
;
; Using `either` will make it more likely the cart gets matched to
; something, but will also increase the number of incorrect matches
; found.
;
; Using `both` will significantly decrease the number of incorrect
; matches, but will also make it more likely no match is found.
;
; ==== Fields ====
; Choose which fields to use. You can select the cart fields and
; database fields separately.
;
;  Options:
;   id32a       : Use only the first (id32a) checksum.
;   id32b       : Use only the second (id32b) checksum.
;
; Cart Fields
crdb.id32.multimatch.cart = id32a|id32b
; Database Fields
crdb.id32.multimatch.database = id32b
;
; ==== Method ====
; Choose the method to use. Only applicable when both of the above
; are using both fields.
;
;  Options:
;   any        : Match any checksum (`a=a|a=b|b=a|b=b`).
;   either     : Match either checksum (`a=a|b=b`).
;   all        : Match all checksums (`a=a&b=b`).
;   invert     : Invert `either` (`a=b|b=a`) or `all` (`a=b&b=a`).
;   or_invert  : Matches normally or inverted.
;
crdb.id32.multimatch.method = any
;

;
; [ SD OPTIONS ]
;
; Increase SD speed but consume higher current at idle
lib.sd.fast = yes
;
; Minimize SD library size
lib.sd.min = no
;
; Enable UTF8 filename support
lib.sd.utf8 = false
;
; Enable dedicated SPI
lib.sd.dedicated = false
;

;
; [ PERFORMANCE FLAGS ]
; These flags allow you to trade resources for faster dumping. Enabling speed-or-death
; will use more SRAM, while enabling any of the rest mainly increases PROGMEM usage.
;
; inline-crc32    : Force CRC32 methods to always inline
; inline-n64      : Force N64 functions to always inline
; shared-file     ; Force some sharedFile functions to always inline*
; file-read       ; Force file reading functions to always inline*
; file-write      ; Force file writing functions to always inline*
; speed-or-death  : Copy CRC32 table into SRAM instead of reading from PROGMEM
;
;performance.flags = inline-crc32|inline-n64
;

;
; ========== NOTE ==========
;
; For the "optimal" N64 dumping speed (resources used vs time saved), set:
;    lib.sd.fast = yes
;    performance.flags = inline-crc32|inline-n64
;
; Fastest possible dumping requires a name brand SD card.
;
; ---- BENCHMARKS ----
;
; These times were as measured by the OSCR firmware using built-in RTC-backed method. If you want
;  to compare using the firmware, you *must* have RTC enabled for accurate timing. The millis()
;  function is unreliable for measuring time when the MCU is heavily loaded. It will tend to report
;  that less time has passed than actually has. It should only be used as a general measurement.
;
; Setup Used:
;  - OSCR HW5 Revision 8 with full on-board ATmega2560, Clock Gen, RTC (DS3231), VSELECT, and CBUS
;  - OSCR Seven-slot top PCB (fully populated capacitors)
;  - StarshadeRETRO OSCR MINI12864 LCD module
;  - 32GB SanDisk Ultra SDHC UHS-I full-size SD card (100 MB/s)
;
; 64MB Dump Times:
;  Unoptimized
;   -> 10 min,  6 sec
;
;  lib.sd.fast
;   ->  8 min,  2 sec
;
;  lib.sd.fast & inline-crc32|inline-n64
;   ->  6 min, 38 sec
;
;  lib.sd.fast & inline-crc32|inline-n64|speed-or-death
;   ->  6 min, 23 sec
;
;  lib.sd.fast & inline-crc32|inline-n64|speed-or-death|shared-file|file-read|file-write
;   ->  5 min, 50 sec
;

;
; [ HARDWARE VERSIONS ]
; Configurations of the various hardware versions. Some of these can be tweaked a little.
;
; Always put the architecture, the output, and then the input, in that order.
;
; Architectures
; - arch:atmega2560       : ATmega2560 support (module or on-board)
;
; Inputs
; - input:rotary          : Rotary dial (such as with the MINI 12864 on HW4 and HW5)
; - input:button2         : 2 buttons as input (such as with HW2 and HW3)
; - input:button1         : 1 button as input (such as with HW1)
;
; Outputs
; - output:lcd:*          : Use the MINI 12864 module (such as with HW4 and HW5). See suboptions below.
; - output:oled           : Use the OLED module (such as with HW1 through HW3).
;
; Bound Input+Outputs
; - io:serial:*           : Use serial communication via USB. See suboptions below.
;
;
; [Suboptions] output:lcd
; - output:lcd:mks        : MKS MINI 12864
; - output:lcd:btt        : BigTreeTech MINI 12864
; - output:lcd:starshade  : StarshadeRETRO OSCR 12864
;
; [Suboptions] Serial
; - io:serial:ascii       : ASCII serial input and output, "classic" serial.
; - io:serial:ansi        : ANSI serial output, requires a terminal which supports ANSI control codes.
;

;
; [ HARDWARE VERSION 5 ]
;
[hardware:5]
extends =
  arch:atmega2560
  output:lcd:starshade
  input:rotary
hardware.version = 5
option.core.sms.adapter = hw5
option.core.gg.adapter = hw5

;
; [ HARDWARE VERSION 4 ]
;
[hardware:4]
extends =
  arch:atmega2560
  output:lcd:mks
  input:rotary
hardware.version = 4

;
; [ HARDWARE VERSION 3 ]
;
[hardware:3]
extends =
  arch:atmega2560
  output:oled
  input:button2
hardware.version = 3

;
; [ HARDWARE VERSION 2 ]
;
[hardware:2]
extends =
  arch:atmega2560
  output:oled
  input:button2
hardware.version = 2

;
; [ HARDWARE VERSION 1 ]
;
[hardware:1]
extends =
  arch:atmega2560
  output:oled
  input:button1
hardware.version = 1

;
; [ SERIAL: ASCII ]
; Set hardware version as needed.
;
[hardware:serial:ascii]
extends =
  arch:atmega2560
  io:serial:ascii
hardware.version = 5
option.lib.sd.dedicated = true

;
; [ SERIAL: ANSI ]
; Set hardware version as needed.
;
[hardware:serial:ansi]
extends =
  arch:atmega2560
  io:serial:ansi
hardware.version = 5
option.lib.sd.dedicated = true
; Debugging must be off
oscr.debugging = false


;
;
; !! END OF USER SETTINGS !!
;
; You shouldn't modify anything below unless you know what you are doing.
;


;
; [ DEFAULTS ]
; Architecture defaults
;
[defaults]
hardware.neopixel = false
option.core.sms.adapter = all
option.core.gg.adapter = all
option.core.sg1000.adapter = all
output.serial_type = ASCII
output.lcd_type =
output.build_flags =
output.lib_deps =
input.lib_deps =

;
; [ ENVIRONMENT ]
;
[env]
extends = core
lib_compat_mode = strict
build_flags =
lib_deps =
  SPI
  Wire

;
; Bound Input/Outputs
;

[io:serial:ascii]
output.type = SERIAL
output.serial_type = ASCII
input.type = SERIAL

[io:serial:ansi]
monitor_speed = 115200
output.type = SERIAL
output.serial_type = ANSI
input.type = SERIAL

;
; Inputs
;

[input:button2]
input.type = button2

[input:button1]
input.type = button1

[input:rotary]
input.type = rotary
input.lib_deps =
  paulstoffregen/FreqCount@^1.3
  mathertel/RotaryEncoder@^1.6.0

;
; Outputs
;

[output:oled]
output.type = SSD1306
output.build_flags =
output.lib_deps =
  olikraus/U8g2@^2.36.18

[output:lcd]
extends =
  peripheral:neopixel
hardware.neopixel = true
output.type = OS12864
output.build_flags =
  ${this.neopixel.build_flags}
output.lib_deps =
  olikraus/U8g2@^2.36.18
  ${this.neopixel.lib_deps}

[output:lcd:mks]
extends = output:lcd
output.lcd_type = MKS
hardware.neopixel_order = normal
output.build_flags =
  ${output:lcd.output.build_flags}

[output:lcd:starshade]
extends = output:lcd
output.lcd_type = Starshade
hardware.neopixel_order = reverse
output.build_flags =
  ${output:lcd.output.build_flags}

[output:lcd:btt]
extends = output:lcd
output.lcd_type = BTT
hardware.neopixel_order = reverse
output.build_flags =
  ${output:lcd.output.build_flags}

;
; Peripherals
;

[peripheral:neopixel]
color.background.red = 100
color.background.green = 0
color.background.blue = 100
color.notification.red = 100
color.notification.green = 100
color.notification.blue = 0
color.error.red = 100
color.error.green = 0
color.error.blue = 0
neopixel.build_flags =
  -D OPTION_LCD_BG_RED=${this.color.background.red}
  -D OPTION_LCD_BG_GREEN=${this.color.background.green}
  -D OPTION_LCD_BG_BLUE=${this.color.background.blue}
  -D OPTION_LCD_NOTIF_RED=${this.color.notification.red}
  -D OPTION_LCD_NOTIF_GREEN=${this.color.notification.green}
  -D OPTION_LCD_NOTIF_BLUE=${this.color.notification.blue}
  -D OPTION_LCD_ERROR_RED=${this.color.error.red}
  -D OPTION_LCD_ERROR_GREEN=${this.color.error.green}
  -D OPTION_LCD_ERROR_BLUE=${this.color.error.blue}
neopixel.lib_deps =
  adafruit/Adafruit NeoPixel@^1.15.4

;
; Architectures
;

[arch:atmega2560]
extends = defaults
build_type = release
cppstd = gnu++20
cstd = gnu11
platform = atmelavr
board = megaatmega2560
framework = arduino
monitor_speed = 9600
app.filebrowser.filename.max = 20
app.filebrowser.files.max = 50
app.filebrowser.sort.len = 10
class.path.depth_max = 5
board_bootloader.file = bootloader/avr/stk500boot_v2_mega2560-min.hex
platform_packages =
  toolchain-atmelavr@symlink://${PROJECT_DIR}/toolchain
build_unflags =
  -std=gnu++11
  -std=gnu11
  -flto
  -Og
arch.build_src_flags =
  ${env.build_flags}
  -D UPD_BAUD=${this.monitor_speed}
  -D UI_FILE_BROWSER_FILENAME_MAX=${this.app.filebrowser.filename.max}
  -D UI_FILE_BROWSER_FILES_MAX=${this.app.filebrowser.files.max}
  -D UI_FILE_BROWSER_FILE_SORT_LEN=${this.app.filebrowser.sort.len}
  -D PATH_MAX_DEPTH=${this.class.path.depth_max}
arch.build_flags =
  ${env.build_flags}
  -Os
  -flto=auto
  -fno-exceptions
  -ffunction-sections
  -fdata-sections
  -mcall-prologues
  -Wl,-flto=auto
arch.extra_scripts =
  pre:toolchain/download.py
  pre:scripts/build_flags.py
  scripts/build_flags.py
arch.lib_deps =
  ${env.lib_deps}
  greiman/SdFat@^2.3.1
  etherkit/Etherkit Si5351@^2.2.0
  adafruit/RTClib@^2.1.4

;
; Final Hardware Environments
;

[env:HardwareV5]
extends = hardware:5
build_src_flags =
  ${this.arch.build_src_flags}
  ${this.output.build_flags}
  -D HW_VERSION=${this.hardware.version}
build_flags =
  ${this.arch.build_flags}
extra_scripts =
  ${this.arch.extra_scripts}
lib_deps =
  ${this.arch.lib_deps}
  ${this.output.lib_deps}
  ${this.input.lib_deps}



[env:HardwareV4]
extends = hardware:4
build_src_flags =
  ${this.arch.build_src_flags}
  ${this.output.build_flags}
  -D HW_VERSION=${this.hardware.version}
build_flags =
  ${this.arch.build_flags}
extra_scripts =
  ${this.arch.extra_scripts}
lib_deps =
  ${this.arch.lib_deps}
  ${this.output.lib_deps}
  ${this.input.lib_deps}



[env:HardwareV3]
extends = hardware:3
build_src_flags =
  ${this.arch.build_src_flags}
  ${this.output.build_flags}
  -D HW_VERSION=${this.hardware.version}
build_flags =
  ${this.arch.build_flags}
extra_scripts =
  ${this.arch.extra_scripts}
lib_deps =
  ${this.arch.lib_deps}
  ${this.output.lib_deps}
  ${this.input.lib_deps}



[env:HardwareV2]
extends = hardware:2
build_src_flags =
  ${this.arch.build_src_flags}
  ${this.output.build_flags}
  -D HW_VERSION=${this.hardware.version}
build_flags =
  ${this.arch.build_flags}
extra_scripts =
  ${this.arch.extra_scripts}
lib_deps =
  ${this.arch.lib_deps}
  ${this.output.lib_deps}
  ${this.input.lib_deps}



[env:HardwareV1]
extends = hardware:1
build_src_flags =
  ${this.arch.build_src_flags}
  ${this.output.build_flags}
  -D HW_VERSION=${this.hardware.version}
build_flags =
  ${this.arch.build_flags}
extra_scripts =
  ${this.arch.extra_scripts}
lib_deps =
  ${this.arch.lib_deps}
  ${this.output.lib_deps}
  ${this.input.lib_deps}



[env:SerialASCII]
extends = hardware:serial:ascii
build_src_flags =
  ${this.arch.build_src_flags}
  ${this.output.build_flags}
