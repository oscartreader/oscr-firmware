;
; ==================================== USER CONFIGURATION FILE ====================================
;
;   This file can/should be used to store your personal settings so they don't get clobbered when
;   you update. You can also easily backup this file between updates to ensure your settings are
;   not lost.
;
;   If you put a setting in here that also exists in the ini files, it will be overridden by the
;   value you put in here. Although this file will start with documentation on most settings and
;   options, it will not be automatically updated as that would defeat its purpose. So, be sure
;   to still check for new available settings/options. You can look in the ini files directly or
;   compare this file to the .user.new.ini file which this file was created from.
;
;   ** NOTE **
;   If you purchased your OSCR as a prebuilt or a kit, you should check your SD card to see if it
;   has a user.ini on it. Your seller might have provided you with one that matches your hardware
;   configuration for your convenience.
;
;
;   # Instructions
;
;   Lines like this which start with ; are purely comments/instructions, so don't delete the ;
;   Lines that start with with ;! are overrides which you can uncomment to enable/change.
;
;   Below is a setting which commented and is showing you the option name and default value:
;     ;!region = auto
;
;   Below is the same setting which has been uncommented and changed:
;     region = na
;
;   Many settings are simply a toggle - on or off. We use "true" and "false" for those.
;     updater = true
;     debugging = false
;
;   Some settings have specific options to choose from. Those settings will list their options
;   before the actual place to set them. When updating, you might want to check if there are any
;   new options available with the update.
;


; =
[platformio]

;
; ================ CUSTOM CONFIG ================
; Use a specific config instead of the default of all HW versions.
;

; Custom version defined at the end of this file
;!default_envs = MyOSCR

; SaveTheHero HW3-ALTER pre-built
;!default_envs = SaveTheHeroV3

; StarshadeRETRO HW5 pre-builts and full-kits with integrated ATmega2560.
;!default_envs = StarshadeV5


; =
[oscr]

;
; ================ FIRMWARE L10N ================
;  Choose your language and region.
;
; ===== LANGUAGES =====
;   - en    : English
;

;!language = en


;
; ===== REGIONS =====
; Choose a region below. Note that region does not dictate cartridge region compatibility. It is
; merely for display/UI purposes, such as displaying "Genesis" or "Mega Drive". In the future, it
; is possible that some cores might make assumptions based on this setting. For instance, if a
; cartridge has multiple versions for different regions but they all look the same initially, the
; core might use this setting as the region to try first to improve detection time.
;
; If a language is set, auto will make some assumptions. For instance, if the language is set to
; English, you will see "Mega Drive/Genesis", but with something other than English, you will see
; the name "Mega Drive", since that was its name everywhere outside NA. If you don't like what it
; chooses, simply change it.
;
;   - auto  : Global
;   - na    : North America
;   - eu    : Europe
;   - as    : Asia (Japan)
;   - af    : Africa
;   - oc    : Oceania
;   - sa    : South America
;   - an    : Antarctica
;

;!region = auto


;
; ================ POWER SAVING =================
; Save power when idle! These power saving options are fairly unobtrusive. You can configure the
; exact methods used later in this file.
;
; Note: The OSCR is only considered idle when sitting on a menu or prompt,
;       if it is actively dumping a cartridge, etc, it will not enter power
;       saving mode.
;

;!powersaving = true


;
; ================ STABILITY FIX ================
; Enable this if your ATmega2560 is unstable when running at 3.3V. It will slow the clock to 8MHz
; when running at 3.3V to increase stability. Note that this will make dumping at 3.3V take about
; twice as the amount of time. You might consider getting a new ATmega2560 instead if you dump a
; lot of 3.3V cartridges.
;

;!mega3v3fix = false


;
; ========= CONFIGURATION FILE SUPPORT ==========
; Allow setting some options via a config file. See the config.txt file the supported settings.
;

;!config = true


;
; =============== UPDATER SUPPORT ===============
; Allows software to identify the hardware version and other features of an OSCR connected via
; USB using serial. It is used by the updater available at OSCR.tools.
;

;!updater = true


;
; ================== DEBUGGING ==================
; Enable debug messages via serial. This can provide helpful additional information via serial
; console to aid in troubleshooting. It requires a lot of extra program space so it's generally
; good to keep it disabled unless you have an issue you are trying to fix (or are a developer).
;
; Note: Cannot be used with, and will be ignored by, ANSI serial.
;

;!debugging = false


; =
[hardware]

;
; ============= ON-BOARD ATMEGA2560 =============
; Support for having an on-board ATmega2560. Only available on HW5R8 or newer.
;
; module      : ATmega2560 is attached as a module
; integrated  : ATmega2560 is direct on-board
;

;!atmega = module


;
; ====== CLOCK SIGNAL GENERATOR (CLOCKGEN) ======
; Support for the Si5351 clock signal generator.
;
; Should be enabled if you have one of:
; - Adafruit Clock Generator module
; - Clone of an Adafruit Clock Generator module
; - The on-board Si5351
;

;!clockgen = false


;
; ============ REAL TIME CLOCK (RTC) ============
; Support for having a real-time clock.
;
; Enable if you have one of:
; - RTC installed on directly on your main board.
; - The StarshadeRETRO Clock Generator module (as it includes RTC).
;

;!rtc = false


;
; ===== RTC TYPE =====
; You can select the type here.
;
; Options:
;   - DS3231  : Standard
;   - DS1307  : Custom
;

;!rtc_type = DS3231


;
; ===== AUTOMATIC VOLTAGE SELECT (VSELECT) ======
; Support for VSELECT (TPS2113 or similar).
;

;!vselect = false


