; =
[options]

;
; =========== UNIQUE DIRECTORY METHOD ===========
; The method used when generating a unique directory name.
;
; Options:
;   - auto       : Decide based on available features
;   - increment  : Use an incrementing number
;   - rtc        : Use the date and time
;   - both       : Use both
;

;!unique.method = auto


;
; ============ POWER SAVING OPTIONS =============
; Fine tune the settings for power saving mode (if enabled).
;


;
; Time before dozing (ms)
;

;!powersaving.idle.drowse = 30000


;
; Time before going to sleep (ms)
;

;!powersaving.idle.sleep = 60000


;
; Methods used
;

;!powersaving.methods = display-dim|display-off|clock-slow


;
; ================= SD OPTIONS ==================
; SD card options.
;

;
; Increase SD speed but consume higher current at idle
;

;!lib.sd.fast = yes


;
; Minimize SD library size. Decreases program size but reduces features.
;

;!lib.sd.min = no


;
; Enable UTF8 filename support
;

;!lib.sd.utf8 = false


;
; ============== PERFORMANCE FLAGS ==============
; These flags allow you to trade resources for faster dumping. Enabling speed-or-death will use
; more SRAM, while enabling any of the rest mostly only increases PROGMEM usage.
;
;   - inline-crc32    : Force CRC32 methods to always inline
;   - inline-n64      : Force N64 functions to always inline
;   - shared-file     : Force some sharedFile functions to always inline
;   - file-read       : Force file reading functions to always inline
;   - file-write      : Force file writing functions to always inline
;   - speed-or-death  : Copy CRC32 table into SRAM instead of reading from PROGMEM
;
; == NOTE ==
; You can select multiple flags by using the bitwise OR operator (|), for example:
;   performance.flags = inline-crc32|inline-n64
;

;!performance.flags =


;
; =========== CUSTOM HARDWARE VERSION ===========
; Configure your own custom hardware version here. This can feel a bit complex, but you can copy
; one of the hardware configs from platformio.ini to start with to make it a little easier.
;
; Some options have suboptions. When an option has a suboption it will end with a colon (:).
;
; For example, `board:ATmega2560:` has several suboptions. Choose one and add it to the end, such
; as `board:ATmega2560:standard`.
;
; Always put the board, the output, and then the input, in that order.
;
; ===== BOARDS ======
;   - board:ATmega2560:   ATmega2560-based MCUs
;     - standard          Standard bootloader for any Arduino MEGA module (or clone)
;     - standard:vs       Standard bootloader with extra support for vselect
;     - standard:obm      Standard bootloader with extra support for an integrated mega (and vselect)
;     - minimal           Minimal bootloader (removes options that aren't needed with the OSCR)
;     - minimal:vs        Minimal bootloader with extra support for vselect
;     - minimal:obm       Minimal bootloader with extra support for an integrated mega (and vselect)
;
; If you are burning a new bootloader, this is how you choose which one.
;
; If you have a modified bootloader, choose the option that corresponds with it.
;
; If you are aren't sure what this means, stick to the standard bootloader. Even
; if it's wrong, it won't hurt anything. If you choose one of the others and it's
; wrong, you can break something.
;
;
; ===== Inputs =====
;   - input:rotary            Rotary dial (such as with the MINI 12864 on HW4 and HW5)
;   - input:button2           2 buttons as input (such as with HW2 and HW3)
;   - input:button1           1 button as input (such as with HW1)
;
;
; ===== Outputs =====
;   - output:oled             SSD1306 OLED display module (typical with HW1 through HW3)
;   - output:lcd:             MINI 12864 module (typical with with HW4 and HW5)
;     - mks                   Makerbase MKS MINI 12864 (most common)
;     - btt                   BigTreeTech MINI 12864
;     - starshade             StarshadeRETRO OSCR 12864
;
;
; ===== Bound Input+Outputs =====
;   - io:serial:              Use serial communication via USB instead of a display.
;     - ascii                 ASCII serial input and output, "classic" serial.
;     - ansi                  ANSI serial output, requires a terminal which supports ANSI control codes.
;


;
; == HARDWARE CONFIG ==
; Here you can setup your own custom hardware. This section is not commented out because it isn't
; overriding any settings in platformio.ini.
;

[hardware:mine]
extends =
  board:ATmega2560:minimal    ; Minimal bootloader
  output:lcd:mks              ; MKS MINI module display
  input:rotary                ; MKS MINI module input
hardware.version = 5          ; hardware version
option.core.sms.adapter = hw5 ; Use HW5's SMS slot
option.core.gg.adapter = hw5  ; Use HW5's GG slot


;
; == BUILD CONFIG  ==
; This is the build configuration used for the above hardware configuration. You don't normally
; need to change this.
;

[env:MyOSCR]
extends = hardware:mine
build_src_flags =
  ${this.arch.build_src_flags}
  ${this.output.build_flags}
  -D HW_VERSION=${this.hardware.version}
build_flags =
  ${this.arch.build_flags}
extra_scripts =
  ${this.arch.extra_scripts}
lib_deps =
  ${this.arch.lib_deps}
  ${this.output.lib_deps}
  ${this.input.lib_deps}

