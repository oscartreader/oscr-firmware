;
; OS12864 Display Module (LCD)
;

[output:lcd]
extends =
  peripheral:neopixel
hardware.neopixel = true
output.type = OS12864
output.build_flags =
  ${this.neopixel.build_flags}
output.lib_deps =
  olikraus/U8g2@^2.36.18
  ${this.neopixel.lib_deps}

[output:lcd:mks]
extends = output:lcd
output.lcd_type = MKS
hardware.neopixel_order = normal
output.build_flags =
  ${output:lcd.output.build_flags}

[output:lcd:starshade]
extends = output:lcd
output.lcd_type = Starshade
hardware.neopixel_order = reverse
output.build_flags =
  ${output:lcd.output.build_flags}

[output:lcd:btt]
extends = output:lcd
output.lcd_type = BTT
hardware.neopixel_order = reverse
output.build_flags =
  ${output:lcd.output.build_flags}
